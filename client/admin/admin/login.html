<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вхід в адмінпанель | DentCareIF</title>

  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>
  <main class="admin-login">
    <section class="admin-login__card">
      <div class="admin-login__header">
        <h1>DentCareIF</h1>
        <p>Вхід в адмінпанель стоматологічної клініки</p>
      </div>

      <form class="admin-login__form" id="loginForm">
        <div class="admin-form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="admin@dentcare.ua"
            required
          >
        </div>

        <div class="admin-form-group">
          <label for="password">Пароль</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Введіть пароль"
            required
          >
        </div>

        <p class="admin-login__error" id="loginError"></p>

        <button class="admin-button admin-button--primary" type="submit">
          Увійти
        </button>
      </form>
    </section>
  </main>

  <script src="assets/js/admin-config.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
